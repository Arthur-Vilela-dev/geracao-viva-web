<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro de Beneficiario - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="bg-white rounded shadow-sm p-4">
                <a class="text-decoration-none" th:href="@{/comunidade}">Voltar</a>
                <h1 class="h3 mt-3">Cadastrar crianca ou adolescente</h1>
                <p class="text-muted">Informe o responsavel legal, os dados do beneficiario e a oficina desejada.</p>

                <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>

                <form th:action="@{/beneficiarios/novo}" th:object="${beneficiarioForm}" method="post">
                    <h2 class="h5">Responsavel legal</h2>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label" for="nomeResponsavel">Nome do responsavel</label>
                            <input class="form-control" id="nomeResponsavel" th:field="*{nomeResponsavel}" type="text" required>
                            <div class="text-danger small" th:errors="*{nomeResponsavel}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="telefoneResponsavel">Telefone</label>
                            <input class="form-control" id="telefoneResponsavel" th:field="*{telefoneResponsavel}" type="text" required>
                            <div class="text-danger small" th:errors="*{telefoneResponsavel}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="cpfResponsavel">CPF</label>
                            <input class="form-control" id="cpfResponsavel" th:field="*{cpfResponsavel}" type="text">
                        </div>
                    </div>

                    <h2 class="h5">Beneficiario</h2>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="nomeCrianca">Nome da crianca/adolescente</label>
                            <input class="form-control" id="nomeCrianca" th:field="*{nomeCrianca}" type="text" required>
                            <div class="text-danger small" th:errors="*{nomeCrianca}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="dataNascimento">Data de nascimento</label>
                            <input class="form-control" id="dataNascimento" th:field="*{dataNascimento}" type="date" required>
                            <div class="text-danger small" th:errors="*{dataNascimento}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="oficinaId">Oficina</label>
                            <select class="form-select" id="oficinaId" th:field="*{oficinaId}" required>
                                <option value="">Selecione</option>
                                <option th:each="oficina : ${oficinas}"
                                        th:value="${oficina.id}"
                                        th:text="${oficina.nome + ' - ' + oficina.horarios}">
                                    Oficina
                                </option>
                            </select>
                            <div class="text-danger small" th:errors="*{oficinaId}"></div>
                        </div>
                    </div>

                    <button class="btn btn-success mt-4" type="submit">Cadastrar e matricular</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
