<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Beneficiarios - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <style>
        body { background: #f6f8fb; }
        .topbar { background: #194d33; color: white; }
    </style>
</head>
<body>
<nav class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <div class="small text-white-50">Administrador</div>
            <h1 class="h4 mb-0">Criancas e adolescentes</h1>
        </div>
        <a class="btn btn-outline-light btn-sm" th:href="@{/admin}">Voltar ao painel</a>
    </div>
</nav>

<main class="container py-4">
    <section class="bg-white rounded shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2 class="h5 mb-1">Beneficiarios cadastrados</h2>
                <p class="small text-muted mb-0">Area restrita ao administrador por causa da RN-003.</p>
            </div>
            <a class="btn btn-sm btn-success" th:href="@{/beneficiarios/novo}">Novo cadastro</a>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Beneficiario</th>
                    <th>Nascimento</th>
                    <th>Responsavel</th>
                    <th>Telefone</th>
                    <th>Oficinas</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(beneficiarios)}">
                    <td colspan="5" class="text-center text-muted py-4">Nenhum beneficiario cadastrado ainda.</td>
                </tr>
                <tr th:each="beneficiario : ${beneficiarios}">
                    <td th:text="${beneficiario.nome}">Nome</td>
                    <td th:text="${beneficiario.dataNascimento}">Data</td>
                    <td th:text="${beneficiario.responsavel.nome}">Responsavel</td>
                    <td th:text="${beneficiario.responsavel.telefone}">Telefone</td>
                    <td>
                        <span class="badge text-bg-success me-1"
                              th:each="matricula : ${beneficiario.matriculas}"
                              th:text="${matricula.oficina.nome}">
                            Oficina
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
