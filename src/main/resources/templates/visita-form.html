<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agendar visita - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="bg-white rounded shadow-sm p-4">
                <a class="small" th:href="@{/}">Voltar para o inicio</a>
                <h1 class="h4 mt-3">Agendar visita</h1>
                <p class="text-muted">Escolha uma data e horario para conhecer a ONG.</p>

                <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>

                <form th:action="@{/visitas/nova}" th:object="${visitaForm}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="nomeVisitante">Nome</label>
                        <input class="form-control" id="nomeVisitante" th:field="*{nomeVisitante}" type="text" required>
                        <div class="text-danger small" th:errors="*{nomeVisitante}"></div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="emailVisitante">Email</label>
                            <input class="form-control" id="emailVisitante" th:field="*{emailVisitante}" type="email">
                            <div class="text-danger small" th:errors="*{emailVisitante}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="telefoneVisitante">Telefone</label>
                            <input class="form-control" id="telefoneVisitante" th:field="*{telefoneVisitante}" type="text" required>
                            <div class="text-danger small" th:errors="*{telefoneVisitante}"></div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label" for="dataHorario">Data e horario</label>
                        <input class="form-control" id="dataHorario" th:field="*{dataHorario}" type="datetime-local" required>
                    </div>

                    <div class="small text-muted mt-3">
                        Horarios padrao da ONG: 09h, 10h, 14h e 15h.
                    </div>

                    <button class="btn btn-info mt-4" type="submit">Agendar visita</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
