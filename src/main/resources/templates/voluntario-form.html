<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seja Voluntario - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="bg-white rounded shadow-sm p-4">
                <a class="text-decoration-none" th:href="@{/}">Voltar ao inicio</a>
                <h1 class="h3 mt-3">Seja voluntario</h1>
                <p class="text-muted">Crie seu login de voluntario. Depois voce podera entrar pelo perfil Voluntario usando este mesmo email e senha.</p>

                <form th:action="@{/voluntarios/novo}" th:object="${voluntarioForm}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="nome">Nome completo</label>
                            <input class="form-control" id="nome" th:field="*{nome}" type="text" required>
                            <div class="text-danger small" th:errors="*{nome}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" th:field="*{email}" type="email" required>
                            <div class="text-danger small" th:errors="*{email}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="senha">Senha</label>
                            <input class="form-control" id="senha" th:field="*{senha}" type="password" required>
                            <div class="text-danger small" th:errors="*{senha}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="telefone">Telefone</label>
                            <input class="form-control" id="telefone" th:field="*{telefone}" type="text" required>
                            <div class="text-danger small" th:errors="*{telefone}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="disponibilidade">Disponibilidade</label>
                            <select class="form-select" id="disponibilidade" th:field="*{disponibilidade}">
                                <option value="Manha">Manha</option>
                                <option value="Tarde">Tarde</option>
                                <option value="Noite">Noite</option>
                                <option value="Finais de semana">Finais de semana</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="habilidades">Habilidades</label>
                            <textarea class="form-control" id="habilidades" th:field="*{habilidades}" rows="4" placeholder="Exemplo: reforco escolar, musica, esportes, organizacao de eventos"></textarea>
                        </div>
                    </div>

                    <button class="btn btn-success mt-4" type="submit">Criar login de voluntario</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
