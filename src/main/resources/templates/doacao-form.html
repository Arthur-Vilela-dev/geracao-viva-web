<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doar - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="bg-white rounded shadow-sm p-4">
                <a class="small" th:href="@{/}">Voltar para o inicio</a>
                <h1 class="h4 mt-3">Fazer doacao</h1>
                <p class="text-muted">Registre uma doacao em dinheiro, alimento, roupa ou material.</p>

                <form th:action="@{/doacoes/nova}" th:object="${doacaoForm}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="tipo">Tipo de doacao</label>
                            <select class="form-select" id="tipo" th:field="*{tipo}" required>
                                <option value="">Selecione</option>
                                <option th:each="tipo : ${tiposDoacao}" th:value="${tipo}" th:text="${tipo}">DINHEIRO</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="valor">Valor, se for dinheiro</label>
                            <input class="form-control" id="valor" th:field="*{valor}" type="number" min="0" step="0.01" placeholder="Ex: 50.00">
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label" for="observacao">Observacao</label>
                        <textarea class="form-control" id="observacao" th:field="*{observacao}" rows="3" placeholder="Ex: 2 cestas basicas, roupas infantis..."></textarea>
                    </div>

                    <button class="btn btn-danger mt-4" type="submit">Registrar doacao</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
