<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Relatorios - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <div class="small text-white-50">Administrador</div>
            <h1 class="h4 mb-0">Relatorios gerais</h1>
        </div>
        <a class="btn btn-outline-light btn-sm" th:href="@{/admin}">Voltar ao painel</a>
    </div>
</nav>

<main class="container py-4">
    <section class="row g-3">
        <div class="col-md-3">
            <div class="bg-white p-4 modern-card h-100">
                <div class="text-muted small">Beneficiarios</div>
                <div class="display-6 fw-bold" th:text="${totalBeneficiarios}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white p-4 modern-card h-100">
                <div class="text-muted small">Voluntarios</div>
                <div class="display-6 fw-bold" th:text="${totalVoluntarios}">0</div>
                <div class="small text-muted">
                    <span th:text="${voluntariosAtivos}">0</span> ativos /
                    <span th:text="${voluntariosPendentes}">0</span> pendentes
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white p-4 modern-card h-100">
                <div class="text-muted small">Oficinas e eventos</div>
                <div class="display-6 fw-bold">
                    <span th:text="${totalOficinas}">0</span>/<span th:text="${totalEventos}">0</span>
                </div>
                <div class="small text-muted">oficinas / eventos</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="bg-white p-4 modern-card h-100">
                <div class="text-muted small">Visitas</div>
                <div class="display-6 fw-bold" th:text="${totalVisitas}">0</div>
            </div>
        </div>
    </section>

    <section class="bg-white p-4 modern-card mt-4">
        <h2 class="h5">Resumo de doacoes</h2>
        <div class="row g-3 mt-1">
            <div class="col-md-6">
                <div class="p-3 rounded border">
                    <div class="small text-muted">Quantidade registrada</div>
                    <div class="fs-3 fw-bold" th:text="${quantidadeDoacoes}">0</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="p-3 rounded border">
                    <div class="small text-muted">Total em dinheiro</div>
                    <div class="fs-3 fw-bold">R$ <span th:text="${totalDoacoes}">0</span></div>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
