<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eventos - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <style>
        body { background: #f6f8fb; }
        .topbar { background: #194d33; color: white; }
        .panel { border-left: 5px solid #0dcaf0; }
    </style>
</head>
<body>
<nav class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <div class="small text-white-50">Administrador</div>
            <h1 class="h4 mb-0">Gestao de eventos</h1>
        </div>
        <a class="btn btn-outline-light btn-sm" th:href="@{/admin}">Voltar ao painel</a>
    </div>
</nav>

<main class="container py-4">
    <div class="alert alert-success" th:if="${mensagem}" th:text="${mensagem}"></div>

    <section class="row g-4">
        <div class="col-lg-5">
            <div class="bg-white rounded shadow-sm p-4 panel">
                <h2 class="h5">Cadastrar evento</h2>
                <p class="small text-muted">Eventos aparecem na pagina inicial e na API REST.</p>

                <form th:action="@{/admin/eventos}" th:object="${eventoForm}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="nome">Nome do evento</label>
                        <input class="form-control" id="nome" th:field="*{nome}" type="text" required>
                        <div class="text-danger small" th:errors="*{nome}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="descricao">Descricao</label>
                        <textarea class="form-control" id="descricao" th:field="*{descricao}" rows="3"></textarea>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-7">
                            <label class="form-label" for="dataHorario">Data e horario</label>
                            <input class="form-control" id="dataHorario" th:field="*{dataHorario}" type="datetime-local" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label" for="quantidadeVagas">Vagas</label>
                            <input class="form-control" id="quantidadeVagas" th:field="*{quantidadeVagas}" type="number" min="1" required>
                            <div class="text-danger small" th:errors="*{quantidadeVagas}"></div>
                        </div>
                    </div>

                    <button class="btn btn-info mt-4" type="submit">Cadastrar evento</button>
                </form>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="bg-white rounded shadow-sm p-4">
                <h2 class="h5 mb-3">Eventos cadastrados</h2>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Evento</th>
                            <th>Data</th>
                            <th>Vagas</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(eventos)}">
                            <td colspan="3" class="text-center text-muted py-4">Nenhum evento cadastrado.</td>
                        </tr>
                        <tr th:each="evento : ${eventos}">
                            <td>
                                <div class="fw-semibold" th:text="${evento.nome}">Evento</div>
                                <div class="small text-muted" th:text="${evento.descricao}">Descricao</div>
                            </td>
                            <td th:text="${#temporals.format(evento.dataHorario, 'dd/MM/yyyy HH:mm')}">Data</td>
                            <td th:text="${evento.quantidadeVagas}">0</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
