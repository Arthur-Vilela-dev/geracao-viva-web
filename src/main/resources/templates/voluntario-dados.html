<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meus dados - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <div class="small text-white-50">Voluntario</div>
            <h1 class="h4 mb-0">Atualizar meus dados</h1>
        </div>
        <a class="btn btn-outline-light btn-sm" th:href="@{/voluntario}">Voltar</a>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <section class="bg-white p-4 modern-card">
                <h2 class="h5">Dados pessoais</h2>
                <p class="text-muted small">Essas informacoes ajudam a administracao a organizar as atividades.</p>

                <form th:action="@{/voluntario/dados}" th:object="${dadosForm}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="nome">Nome</label>
                        <input class="form-control" id="nome" th:field="*{nome}" type="text" required>
                        <div class="text-danger small" th:errors="*{nome}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="telefone">Telefone</label>
                        <input class="form-control" id="telefone" th:field="*{telefone}" type="text" required>
                        <div class="text-danger small" th:errors="*{telefone}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="habilidades">Habilidades</label>
                        <textarea class="form-control" id="habilidades" th:field="*{habilidades}" rows="4"></textarea>
                    </div>

                    <button class="btn btn-success" type="submit">Salvar alteracoes</button>
                </form>
            </section>
        </div>
    </div>
</main>
</body>
</html>
