<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oficinas - Conecta Geracao Viva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <style>
        body { background: #f6f8fb; }
        .topbar { background: #194d33; color: white; }
        .panel { border-left: 5px solid #ffc107; }
    </style>
</head>
<body>
<nav class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <div class="small text-white-50">Administrador</div>
            <h1 class="h4 mb-0">Gestao de oficinas</h1>
        </div>
        <a class="btn btn-outline-light btn-sm" th:href="@{/admin}">Voltar ao painel</a>
    </div>
</nav>

<main class="container py-4">
    <div class="alert alert-success" th:if="${mensagem}" th:text="${mensagem}"></div>

    <section class="row g-4">
        <div class="col-lg-5">
            <div class="bg-white rounded shadow-sm p-4 panel">
                <h2 class="h5">Cadastrar oficina</h2>
                <p class="small text-muted">Defina nome, descricao, vagas, horarios e instrutor responsavel.</p>

                <form th:action="@{/admin/oficinas}" th:object="${oficinaForm}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="nome">Nome da oficina</label>
                        <input class="form-control" id="nome" th:field="*{nome}" type="text" required>
                        <div class="text-danger small" th:errors="*{nome}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="descricao">Descricao</label>
                        <textarea class="form-control" id="descricao" th:field="*{descricao}" rows="3"></textarea>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label" for="numeroVagas">Vagas</label>
                            <input class="form-control" id="numeroVagas" th:field="*{numeroVagas}" type="number" min="1" required>
                            <div class="text-danger small" th:errors="*{numeroVagas}"></div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label" for="horarios">Horarios</label>
                            <input class="form-control" id="horarios" th:field="*{horarios}" type="text" placeholder="Ex: Segundas - 14h" required>
                            <div class="text-danger small" th:errors="*{horarios}"></div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label" for="instrutorResponsavel">Instrutor responsavel</label>
                        <input class="form-control" id="instrutorResponsavel" th:field="*{instrutorResponsavel}" type="text" required>
                        <div class="text-danger small" th:errors="*{instrutorResponsavel}"></div>
                    </div>

                    <button class="btn btn-warning mt-4" type="submit">Cadastrar oficina</button>
                </form>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="bg-white rounded shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h2 class="h5 mb-1">Oficinas cadastradas</h2>
                        <p class="small text-muted mb-0">Total: <span th:text="${totalOficinas}">0</span></p>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Oficina</th>
                            <th>Horarios</th>
                            <th>Instrutor</th>
                            <th>Vagas</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(oficinas)}">
                            <td colspan="4" class="text-center text-muted py-4">Nenhuma oficina cadastrada.</td>
                        </tr>
                        <tr th:each="oficina : ${oficinas}">
                            <td>
                                <div class="fw-semibold" th:text="${oficina.nome}">Nome</div>
                                <div class="small text-muted" th:text="${oficina.descricao}">Descricao</div>
                            </td>
                            <td th:text="${oficina.horarios}">Horarios</td>
                            <td th:text="${oficina.instrutorResponsavel}">Instrutor</td>
                            <td>
                                <span th:text="${oficinaService.contarMatriculas(oficina.id)}">0</span>
                                /
                                <span th:text="${oficina.numeroVagas}">0</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
