spring.application.name=geracao-viva

# Usa o perfil local no seu computador. O arquivo application-local.properties fica fora do Git.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Porta padrao do sistema no navegador: http://localhost:8080
server.port=8080

# Configuracao do MySQL. Crie esse banco antes de executar o projeto:
# CREATE DATABASE geracao_viva CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.url=jdbc:mysql://localhost:3306/geracao_viva?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# O Hibernate cria/atualiza as tabelas automaticamente durante o aprendizado.
# Em sistemas reais, prefira migrations com Flyway ou Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garante UTF-8 nas respostas HTML.
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Thymeleaf recarrega templates durante o desenvolvimento.
spring.thymeleaf.cache=false
